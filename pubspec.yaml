  # flutter_localization: ^0.1.14

dev_dependencies: 
  flutter_lints: 
  flutter_test: 
    sdk: flutter

flutter: 
  generate: true
  assets: 
    - assets/splash/
    - assets/icons/
    - assets/profile/
    - assets/flags/
    - assets/concoures/

  uses-material-design: true

  fonts: 
    - family: Bitter
      fonts:
        - asset: fonts/Bitter-Medium.ttf

    - family: Bitter_italic
      fonts:
        - asset: fonts/Bitter-Mediumitalic.ttf
    
    - family: Fontspring
      fonts:
        - asset: fonts/Fontspring.otf